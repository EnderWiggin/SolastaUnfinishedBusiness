# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "release" ]
  pull_request:
    branches: [ "release" ]
env:
  SolastaInstallDir: ../SolastaFiles
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore SolastaUnfinishedBusiness.sln
    - name: Clean
      run: dotnet clean SolastaUnfinishedBusiness.sln
    - name: Build
      run: dotnet build SolastaUnfinishedBusiness.sln --no-restore -c "Release Install"
